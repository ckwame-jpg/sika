[project]
name = "ml-features"
version = "0.1.0"
description = "Shared feature vectorization spec used by sika train + serve paths."
requires-python = ">=3.11"
dependencies = ["numpy>=1.26"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["ml_features"]

[tool.setuptools.package-data]
# Smarter NFL PR 5 — the precomputed conditional margin grid must ship
# inside the wheel/editable install for ``ml_features.nfl_pricing``.
ml_features = ["data/*.json"]
