databases:
  - name: sika-db
    plan: free
    databaseName: sika
    user: sika

services:
  - type: web
    name: sika-api
    runtime: docker
    repo: https://github.com/ckwame-jpg/sika.git
    branch: main
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sika-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: KALSHI_KEY_ID
        sync: false
      - key: KALSHI_PRIVATE_KEY_PATH
        value: /etc/secrets/kalshi-demo.key
      - key: WEB_ORIGINS
        sync: false
    secretFiles:
      - name: kalshi-demo.key
        filePath: /etc/secrets/kalshi-demo.key
