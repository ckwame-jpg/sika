[project]
name = "ml-features"
version = "0.1.0"
description = "Shared feature vectorization spec used by sika train + serve paths."
requires-python = ">=3.11"
dependencies = ["numpy>=1.26"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["ml_features"]
