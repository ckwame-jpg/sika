databases:
  - name: sika
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "18"
    diskSizeGB: 5

services:
  - type: web
    name: sika
    runtime: docker
    repo: https://github.com/ckwame-jpg/sika.git
    branch: main
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    plan: standard
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sika
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: APP_ROLE
        value: web
      - key: ML_SERVING_MODE
        sync: false
      - key: ML_MANIFEST_PATH
        sync: false
      - key: ML_FAMILY_MODES_JSON
        sync: false
      - key: KALSHI_KEY_ID
        sync: false
      - key: KALSHI_PRIVATE_KEY_PATH
        value: /etc/secrets/kalshi-demo.key
      - key: WEB_ORIGINS
        sync: false
    secretFiles:
      - name: kalshi-demo.key
        filePath: /etc/secrets/kalshi-demo.key
